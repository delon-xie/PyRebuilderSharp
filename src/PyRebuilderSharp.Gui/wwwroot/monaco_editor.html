<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyRebuilderSharp Code Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #1e1e1e; }
  #container { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script>
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });

let editor = null;

require(['vs/editor/editor.main'], function () {
  // VS Code Dark+ 主题
  monaco.editor.defineTheme('pyrebuilder-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'comment', foreground: '6A9955' },
      { token: 'keyword', foreground: '569CD6', fontStyle: 'bold' },
      { token: 'string', foreground: 'CE9178' },
      { token: 'number', foreground: 'B5CEA8' },
    ],
    colors: {
      'editor.background': '#1e1e1e',
      'editor.foreground': '#d4d4d4',
      'editor.lineHighlightBackground': '#2a2d2e',
      'editorLineNumber.foreground': '#858585',
      'editorCursor.foreground': '#aeafad',
      'editor.selectionBackground': '#264f78',
    }
  });

  editor = monaco.editor.create(document.getElementById('container'), {
    value: '',
    language: 'python',
    theme: 'pyrebuilder-dark',
    fontSize: 13,
    fontFamily: "'Consolas', 'Courier New', monospace",
    lineNumbers: 'on',
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    readOnly: true,
    automaticLayout: true,
    wordWrap: 'off',
    renderWhitespace: 'none',
    padding: { top: 8 },
  });
});

// 供 C# 调用的接口
function setCode(code) {
  if (!editor) {
    // 等待编辑器初始化完成
    setTimeout(() => setCode(code), 100);
    return;
  }
  editor.setValue(code);
}

function setCodeAndLanguage(code, lang) {
  if (!editor) {
    setTimeout(() => setCodeAndLanguage(code, lang), 100);
    return;
  }
  editor.setValue(code);
  monaco.editor.setModelLanguage(editor.getModel(), lang);
}
</script>
</body>
</html>
