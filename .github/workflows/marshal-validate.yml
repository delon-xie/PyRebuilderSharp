name: Marshal Constants Cross-Validation

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  pull_request:
    paths:
      - 'src/PyRebuilderSharp.Core/Readers/MarshalType.cs'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run MarshalType cross-validation
        id: validate
        run: |
          echo "VALIDATE_OUTPUT<<EOF" >> $GITHUB_ENV
          python3 tools/validate_marshal_types.py >> $GITHUB_ENV 2>&1
          echo "EOF" >> $GITHUB_ENV

      - name: Create issue on mismatch (scheduled only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const body = process.env.VALIDATE_OUTPUT;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ MarshalType constants mismatch detected',
              body: 'A scheduled cross-validation found mismatches between '
                  + 'PyRebuilderSharp\\'s `MarshalType.cs` and one or more '
                  + 'CPython versions.\n\n```\n' + body + '\n```\n\n'
                  + '**Action required:** Compare against CPython marshal.c '
                  + 'and update the constants.'
                  + '\n\nSee: <https://github.com/python/cpython/tree/main/Python/marshal.c>'
                  + '\n\n_This issue was auto-generated by the marshal-validate workflow._'
            });
